<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Inicio - Restaurantes</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen">

  <!-- Navbar -->
  <header class="bg-white shadow sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-6 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
      <h1 id="site-title" class="text-2xl font-bold text-blue-600 cursor-pointer">🧆 Rod Eats</h1>
      <div class="flex gap-2 w-full md:w-auto">
        <input id="search-input" type="text" placeholder="Buscar por nombre o tipo" class="flex-1 border px-3 py-2 rounded w-full" />
        <button id="search-btn" class="bg-blue-600 text-white px-4 py-2 rounded">Buscar</button>
      </div>
      <button onclick="location.href='pages/addRestaurant/addRestaurant.html'" class="text-sm text-white bg-green-600 px-4 py-2 rounded hover:bg-green-700">+ Agregar Restaurante</button>
    </div>
  </header>

  <!-- Contenido principal -->
  <main class="max-w-6xl mx-auto p-6 space-y-12">
    <section>
      <h2 class="text-xl font-bold mb-4">🗂 Todos los restaurantes</h2>
      <div id="all-restaurants" class="flex gap-4 overflow-x-auto"></div>
    </section>

    <section>
      <h2 class="text-xl font-bold mb-4">⭐ Favoritos recientes</h2>
      <div id="favorites" class="flex gap-4 overflow-x-auto"></div>
    </section>

    <section>
      <h2 class="text-xl font-bold mb-4">🔥 Más pedidos</h2>
      <div id="top-orders" class="flex gap-4 overflow-x-auto"></div>
    </section>
  </main>

  <footer class="bg-white mt-12 border-t text-center py-4 text-sm text-gray-500">
    © 2025. Todos los derechos reservados.
  </footer>

  <script src="./scripts/index.js" type="module"></script>
</body>
</html>
