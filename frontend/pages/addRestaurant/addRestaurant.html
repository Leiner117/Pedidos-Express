<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agregar Nuevo Restaurante</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        select:not([data-value]) {
            color: gray;
        }
        select:not([data-value])::before {
            content: attr(data-placeholder);
            color: gray;
        }
        select option {
            color: black;
        }
        select option:first-child {
            display: none;
        }
    </style>
</head>

<body class="bg-white min-h-screen flex flex-col">
    <!-- Overlay de carga (animación + texto) -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white p-8 rounded-lg flex flex-col items-center space-y-4">
            <!-- Aquí podría ir un spinner SVG/CSS -->
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-800"></div>
            <p class="text-blue-800 font-semibold">Creando restaurante...</p>
        </div>
    </div>

    <!-- Modal de éxito -->
    <div id="successOverlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white p-8 rounded-lg text-center space-y-4">
            <p class="text-green-600 font-bold">¡Restaurante creado con éxito!</p>
            <button id="goHomeBtn" class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600">
                Ir a inicio
            </button>
        </div>
    </div>

    <!-- Contenedor principal full-width -->
    <div class="w-full bg-white shadow flex-grow">

        <!-- Header full-width -->
        <header class="w-full bg-blue-800 text-white p-6">
            <h1 class="text-2xl font-bold">Agregar Nuevo Restaurante</h1>
            <p class="mt-1">Complete el formulario para agregar un nuevo restaurante a nuestra plataforma</p>
        </header>

        <!-- Formulario full-width -->
        <form id="restaurantForm" class="w-full p-6 space-y-8" novalidate>

            <!-- IMAGEN RESTAURANTE -->
            <div class="space-y-6">
                <div>
                    <!-- Input para seleccionar imagen local (.jpg, máx 5MB) -->
                    <label class="block text-blue-800 font-semibold mb-2">
                        Imagen del restaurante <span class="text-sm text-gray-500">(opcional)</span>
                    </label>
                    <div class="flex justify-center w-full">
                        <div id="restaurantImageDrop"
                            class="relative w-full h-40 border-2 border-dashed border-blue-300 rounded-lg flex items-center justify-center text-blue-600 cursor-pointer hover:bg-blue-50 overflow-hidden transition-all duration-300">
                            <input type="file" accept=".jpg" id="restaurantImageInput"
                                class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                            <div class="text-center" id="restaurantImagePlaceholder">
                                <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-8 w-8" fill="none"
                                    viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M12 12v8m0 0l-3-3m3 3l3-3M12 4v8" />
                                </svg>
                                <p>Haga clic para seleccionar una imagen</p>
                                <p class="text-xs">JPG (máx. 5 MB)</p>
                            </div>
                            <img id="restaurantImagePreview" class="absolute inset-0 w-full h-full object-contain rounded-lg hidden" />
                        </div>
                    </div>
                    <!-- Mensaje de error para la imagen del restaurante -->
                    <p id="errorRestaurantImage" class="text-red-600 text-sm mt-1 hidden"></p>
                </div>

                <!-- DATOS BÁSICOS -->
                <div class="space-y-4">
                    <!-- Nombre del restaurante (obligatorio, max 15 caracteres) -->
                    <div>
                        <label for="restaurantName" class="block text-blue-800 font-semibold mb-1">
                            Nombre del restaurante <span class="text-red-500">*</span>
                        </label>
                        <input id="restaurantName" name="restaurantName" type="text" required
                            placeholder="Ingrese el nombre del restaurante"
                            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
                        <p id="errorRestaurantName" class="text-red-600 text-sm mt-1 hidden"></p>
                    </div>

                    <!-- Tipo de restaurante (obligatorio, lista fija) -->
                    <div>
                        <label for="restaurantType" class="block text-blue-800 font-semibold mb-1">
                            Tipo de restaurante <span class="text-red-500">*</span>
                        </label>
                        <select id="restaurantType" name="restaurantType" required
                            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 [&:not(:focus):not([data-value])]:text-black"
                            data-placeholder="Seleccione un tipo de restaurante">
                            <option value="" disabled selected hidden></option>
                            <option>Comida Típica</option>
                            <option>Comida Rápida</option>
                            <option>Comida Italiana</option>
                            <option>Comida Mexicana</option>
                            <option>Comida Griega</option>
                            <option>Comida Asiática</option>
                            <option>Postres y Repostería</option>
                            <option>Cafetería</option>
                            <option>Batidos y Helados</option>
                        </select>
                        <p id="errorRestaurantType" class="text-red-600 text-sm mt-1 hidden"></p>
                    </div>
                </div>
            </div>

            <!-- SECCIÓN DINÁMICA DE COMIDAS -->
            <section>
                <h2 class="text-xl text-blue-800 font-semibold">
                    Comidas del restaurante <span class="text-red-500">*</span>
                </h2>
                <div id="mealsContainer" class="space-y-6 mt-4">
                    <!-- Aquí se insertarán las tarjetas de comida -->
                </div>
                <button type="button" id="addMealBtn"
                    class="mt-4 inline-flex items-center px-4 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600 transition">
                    <!-- Botón para agregar comidas dinámicamente -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    Agregar comida
                </button>
                <p id="errorMeals" class="text-red-600 text-sm mt-1 hidden"></p>
            </section>

            <!-- SUBMIT -->
            <div class="pt-4">
                <!-- Botón de envío con validación en JavaScript -->
                <button type="submit"
                    class="w-full px-6 py-3 bg-blue-800 text-white font-semibold rounded-lg hover:bg-blue-900 transition">
                    Crear Restaurante
                </button>
            </div>
        </form>
    </div>

    <!-- TEMPLATE OCULTO DE UNA COMIDA -->
    <template id="mealTemplate">
        <div class="relative border border-blue-200 rounded-lg p-6 space-y-4">
            <!-- Nombre de comida (obligatorio, maxlength=150) -->
            <div>
                <label class="block text-blue-800 font-medium mb-1">
                    Nombre de la comida <span class="text-red-500">*</span>
                </label>
                <input type="text" name="mealName[]" required maxlength="150"
                    placeholder="Ingrese el nombre de la comida"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-300" />
                <p class="text-red-600 text-sm mt-1 hidden meal-error-name"></p>
            </div>
            <!-- Precio (obligatorio) -->
            <div>
                <label class="block text-blue-800 font-medium mb-1">
                    Precio <span class="text-red-500">*</span>
                </label>
                <input type="number" name="mealPrice[]" required min="0" step="0.01" value="0"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-300" />
                <p class="text-red-600 text-sm mt-1 hidden meal-error-price"></p>
            </div>
            <!-- Imagen comida (opcional, .jpg, máx 2MB) -->
            <div>
                <label class="block text-blue-800 font-medium mb-1">
                    Imagen de la comida <span class="text-sm text-gray-500">(opcional)</span>
                </label>
                <div class="flex justify-center w-full">
                    <div class="relative w-full h-32 border-2 border-dashed border-blue-200 rounded-lg flex items-center justify-center text-blue-400 cursor-pointer hover:bg-blue-50 overflow-hidden transition-all duration-300">
                        <input type="file" name="mealImage[]" accept=".jpg" class="meal-image-input absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                        <div class="text-center text-sm meal-image-placeholder">
                            <p>Haga clic para seleccionar</p>
                            <p class="text-xs">JPG (máx. 2 MB)</p>
                        </div>
                        <img class="meal-image-preview absolute inset-0 w-full h-full object-contain rounded-lg hidden" />
                    </div>
                </div>
                <p class="text-red-600 text-sm mt-1 hidden meal-error-image"></p>
            </div>
            <!-- Botón eliminar comida -->
            <button type="button" class="absolute -top-3 right-2 text-red-500 hover:text-red-700"
                onclick="removeMeal(this)">
                X
            </button>
        </div>
    </template>
    <script src="./scripts/addRestaurant.js"></script>
</body>
</html>
